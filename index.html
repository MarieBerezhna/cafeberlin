<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Berlín Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;padding:1rem;background:#0f0e0c;color:#e8e6e1}
.wrap{max-width:900px;margin:0 auto;padding:1rem 0}
h1{font-size:18px;font-weight:500;margin-bottom:1rem;color:#e8e6e1}
.tabs-scroll{overflow-x:auto;padding-bottom:4px;margin-bottom:1rem}
.tabs{display:flex;gap:4px;width:max-content;background:#1e1d1a;border-radius:10px;padding:4px}
.tab{padding:6px 12px;border-radius:7px;border:none;background:transparent;font-size:13px;color:#7a7875;cursor:pointer;white-space:nowrap}
.tab:hover{color:#e8e6e1}
.tab.active{background:#2a2926;color:#e8e6e1;font-weight:500;border:0.5px solid rgba(232,230,225,0.15)}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;align-items:center}
.filter-label{font-size:12px;color:#7a7875;margin-right:2px}
.filt{padding:4px 10px;border-radius:20px;border:0.5px solid rgba(232,230,225,0.25);background:transparent;font-size:12px;color:#7a7875;cursor:pointer}
.filt.on{background:#e8e6e1;color:#0f0e0c;border-color:#e8e6e1}
.pbar{height:3px;background:#1e1d1a;border-radius:2px;margin-bottom:1rem}
.pfill{height:3px;background:#e8e6e1;border-radius:2px;transition:width .4s}
.meta{display:flex;gap:8px;margin-bottom:1rem}
.mc{flex:1;background:#1e1d1a;border-radius:8px;padding:10px;text-align:center}
.ml{font-size:11px;color:#7a7875}
.mv{font-size:20px;font-weight:500;color:#e8e6e1}
.qcard{background:#1a1917;border:0.5px solid rgba(232,230,225,0.1);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.qtype{font-size:11px;font-weight:500;color:#7a7875;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.qtag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;background:#2a2926;color:#7a7875;margin-left:6px;font-weight:400;text-transform:none;letter-spacing:0}
.qtext{font-size:16px;font-weight:500;line-height:1.5;margin-bottom:3px;color:#e8e6e1}
.opts{display:grid;gap:7px}
.ob{text-align:center;background:#232220;border:0.5px solid rgba(232,230,225,0.1);border-radius:8px;padding:9px 13px;font-size:14px;cursor:pointer;color:#e8e6e1}
.ob:hover:not(:disabled){background:#2a2926;border-color:rgba(232,230,225,0.3)}
.ob:disabled{cursor:default}
.ob.ok{background:#1a3010;border-color:#4a8020;color:#97c459}
.ob.bad{background:#2e1010;border-color:#8b2020;color:#e07070}
.fb{margin-top:10px;font-size:13px;color:#7a7875;border-top:0.5px solid rgba(232,230,225,0.1);padding-top:10px;line-height:1.6;display:none}
.fb strong{color:#e8e6e1}
.nav{display:flex;gap:8px;margin-top:10px}
.nav button{flex:1;padding:9px;border:0.5px solid rgba(232,230,225,0.25);border-radius:8px;background:transparent;font-size:14px;cursor:pointer;color:#e8e6e1}
.nav button:hover{background:#2a2926}
.nav button.pri{background:#e8e6e1;color:#0f0e0c;border-color:#e8e6e1}
.nav button.pri:hover{background:#c8c6c1}
.end{text-align:center;padding:2rem 1rem}
.end .big{font-size:44px;margin-bottom:8px}
.end .sc{font-size:28px;font-weight:500;margin-bottom:8px;color:#e8e6e1}
.end p{color:#7a7875;font-size:14px;line-height:1.6}
.no-q{padding:2rem;text-align:center;color:#7a7875;font-size:14px}
.mode-switch{display:flex;gap:4px;background:#1f1e1b;border-radius:8px;padding:3px}
.mode-btn{padding:5px 14px;border-radius:6px;border:none;background:transparent;font-size:13px;color:#9a9793;cursor:pointer;transition:all .15s}
.mode-btn.active{background:#2a2926;color:#e8e6e1;font-weight:500}
.learn-card{background:#1f1e1b;border:0.5px solid rgba(232,230,225,0.12);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.learn-name{font-size:20px;font-weight:600;color:#e8e6e1;margin-bottom:1rem;text-align:center}
.learn-price{font-size:14px;font-weight:600;color:#E0AE6B}
.learn-ingr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:1rem}
.learn-ingr-item{display:flex;flex-direction:column;align-items:center;gap:6px;background:#2a2926;border-radius:8px;padding:12px 10px;font-size:12px;color:#e8e6e1;text-align:center}
.learn-ingr-item img{width:150px;height:150px;object-fit:cover;border-radius:6px}
.learn-ingr-item.no-img{justify-content:center;min-height:40px}
.ingr-group{margin-bottom:14px}
.ingr-row{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.ingr-row .ingr-group{flex:1;min-width:140px;margin-bottom:0}
.ingr-group-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;opacity:.85}
.ingr-group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
/* group color themes — border more saturated than background */
.grp-spirit .ingr-group-label{color:#F09595}
.grp-spirit .learn-ingr-item,.recall-opt.grp-spirit{background:#3a1414;border:1.5px solid #C24343}
.grp-liqueur .ingr-group-label{color:#E0AE6B}
.grp-liqueur .learn-ingr-item,.recall-opt.grp-liqueur{background:#3a2810;border:1.5px solid #C5852E}
.grp-filler .ingr-group-label{color:#8FC1E0}
.grp-filler .learn-ingr-item,.recall-opt.grp-filler{background:#10262f;border:1.5px solid #2E86B8}
.grp-bitter .ingr-group-label{color:#C9A0DC}
.grp-bitter .learn-ingr-item,.recall-opt.grp-bitter{background:#2a1830;border:1.5px solid #8A4FA8}
.grp-sweet .ingr-group-label{color:#9ECB7A}
.grp-sweet .learn-ingr-item,.recall-opt.grp-sweet{background:#16290f;border:1.5px solid #4F8C2E}
.grp-other .ingr-group-label{color:#9a9793}
.grp-other .learn-ingr-item,.recall-opt.grp-other{background:#26241f;border:1.5px solid #5a5650}
/* selection/result states must override group color */
.recall-opt.selected{border-color:#639922 !important;background:#1a3a08 !important}
.recall-opt.correct{background:#27500A !important;border-color:#97C459 !important;color:#C0DD97}
.recall-opt.missed{background:#4a2800 !important;border-color:#c87020 !important;color:#f0a060}
.recall-opt.wrong{background:#791F1F !important;border-color:#F09595 !important;color:#F7C1C1}
.recall-opt{display:flex;flex-direction:column;align-items:center;gap:6px;background:#2a2926;border:0.5px solid rgba(232,230,225,0.12);border-radius:8px;padding:12px 10px;font-size:12px;color:#e8e6e1;text-align:center;cursor:pointer;transition:all .15s}
.recall-opt img{width:150px;height:150px;object-fit:cover;border-radius:6px}
.recall-opt:disabled,.recall-opt[data-locked]{cursor:default}
.learn-hint{font-size:12px;color:#9a9793;text-align:center;margin-bottom:.75rem}
.learn-counter{font-size:13px;color:#9a9793;text-align:center;margin-bottom:1rem}
.opts-img{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ob-img{display:flex;flex-direction:column;align-items:center;gap:8px;background:#2a2926;border:0.5px solid rgba(232,230,225,0.12);border-radius:8px;padding:12px;font-size:13px;cursor:pointer;color:#e8e6e1;text-align:center}
.ob-img:hover:not(:disabled){background:#333230;border-color:rgba(232,230,225,0.35)}
.ob-img:disabled{cursor:default}
.ob-img img{width:150px;height:150px;object-fit:cover;border-radius:6px}
.ob-img.ok{background:#27500A;border-color:#97C459;color:#C0DD97}
.ob-img.bad{background:#791F1F;border-color:#F09595;color:#F7C1C1}
.qimg{display:block;max-height:150px;max-width:150px;object-fit:contain;border-radius:8px;margin:0 auto 1rem}
</style>
</head>

const ALL_INGRS = [...new Set(RAW.filter(x=>x.hasIngr&&x.ingr).flatMap(x=>x.ingr))];
// Flat list of all {name, serving_es, serving_en, price} for wrong-answer pool
const ALL_PRICES_FLAT = RAW.flatMap(x=>(x.prices||[]).map(s=>s.p));
const UNIQUE_PRICES = [...new Set(ALL_PRICES_FLAT)];

const CATS = ["Todo",...[...new Set(RAW.map(x=>x.cat))]];
const FILTER_TYPES = ["ingredients","price","category","name"];
const FILTER_LABELS    = {ingredients:"Ingredientes",price:"Precio",category:"Categoría",name:"Nombre"};
const Q_META = {
  ingredients:  "¿Qué lleva?",
  ingredients2: "¿Cuál más?",
  ingredients3: "¿Cuál NO lleva?",
  price:        "Precio exacto",
  ratio:        "Ratio",
  category:     "Categoría",
  name:         "Nombre",
};

let activeTab="Coctelería clásica", activeFilters=new Set(FILTER_TYPES);
let questions=[], cur=0, score=0, answered=false;

const sh   = a=>[...a].sort(()=>Math.random()-.5);
const pick = (a,n)=>sh(a).slice(0,n);
const fmt  = p=>`${p.toFixed(2).replace(".",",")} €`;

function getPool(){ return activeTab==="Todo"?RAW:RAW.filter(x=>x.cat===activeTab); }

function makeQs(){
  const pool=getPool();
  const cocktails=pool.filter(x=>x.hasIngr&&x.ingr&&x.ingr.length>1);
  const allCats=[...new Set(RAW.map(x=>x.cat))];
  const res=[];

  // --- Ingredient questions (cocktails only) ---
  if(activeFilters.has("ingredients")){
    cocktails.forEach(item=>{
      // Type 1: which IS an ingredient
      const c1=item.ingr[Math.floor(Math.random()*item.ingr.length)];
      const w1=sh(ALL_INGRS.filter(i=>!item.ingr.includes(i))).slice(0,3);
      if(w1.length>=3) res.push({qtype:"ingredients",img:IMAGES[item.name]||null,
        q:`¿Cuál de estos ingredientes lleva el ${item.name}?`,
        opts:sh([c1,...w1]),answer:c1,cat:item.cat,
        hint:`${item.name}: ${item.ingr.join(", ")}`});
      // Type 2: complete the recipe
      if(item.ingr.length>=3){
        const s=sh(item.ingr); const shown=s.slice(0,2),c2=s[2];
        const w2=sh(ALL_INGRS.filter(i=>!item.ingr.includes(i))).slice(0,3);
        if(w2.length>=3) res.push({qtype:"ingredients2",img:IMAGES[item.name]||null,
          q:`El ${item.name} lleva ${shown.join(" y ")}… ¿cuál más?`,
          opts:sh([c2,...w2]),answer:c2,cat:item.cat,
          hint:`${item.name}: ${item.ingr.join(", ")}`});
      }
      // Type 3: which is NOT an ingredient
      if(item.ingr.length>=3){
        const intruder=sh(ALL_INGRS.filter(i=>!item.ingr.includes(i)))[0];
        const decoys=sh(item.ingr).slice(0,3);
        if(intruder&&decoys.length>=3) res.push({qtype:"ingredients3",img:IMAGES[item.name]||null,
          q:`¿Cuál de estos NO lleva el ${item.name}?`,
          opts:sh([intruder,...decoys]),answer:intruder,cat:item.cat,
          hint:`${item.name} lleva: ${item.ingr.join(", ")}`});
      }
    });
  }

  // --- Price questions: one per serving format ---
  if(activeFilters.has("price")){
    pool.filter(item=>item.prices && item.prices.length).forEach(item=>{
      item.prices.forEach(serving=>{
        // Wrong options: other prices from the whole menu, excluding the correct value
        const wrongPs=sh(UNIQUE_PRICES.filter(p=>p!==serving.p)).slice(0,3);
        const allOpts=sh([serving.p,...wrongPs]).map(fmt);
        const hint_parts=item.prices.map(s=>`${s.label}: ${fmt(s.p)}`).join(" · ");
        res.push({qtype:"price",img:IMAGES[item.name]||null,
          q:`¿Cuánto cuesta el ${item.name} (${serving.label})?`,
          opts:allOpts, answer:fmt(serving.p), cat:item.cat,
          hint:`${item.name} — ${hint_parts}`});
      });
    });
  }


  // --- Category questions (only in "Todo" tab) ---
  if(activeFilters.has("category")&&activeTab==="Todo"){
    pool.forEach(item=>{
      const wrongCats=sh(allCats.filter(c=>c!==item.cat)).slice(0,3);
      res.push({qtype:"category",img:IMAGES[item.name]||null,
        q:`¿En qué sección está el ${item.name}?`,
        opts:sh([item.cat,...wrongCats]),answer:item.cat,cat:item.cat,
        hint:`${item.name} está en "${item.cat}"`});
    });
  }

  // --- Ratio questions (only for items with doses) ---
  if(activeFilters.has("ingredients")){
    const itemsWithDoses = pool.filter(x=>x.doses && Object.keys(x.doses).length>0);
    const allItemsWithDoses = RAW.filter(x=>x.doses && Object.keys(x.doses).length>0);

    // Helper: build a ratio string for an item
    function ratioStr(item){
      return item.ingr.map(ing=>{
        const dose = item.doses && item.doses[ing];
        return dose ? `${dose} ${ing}` : ing;
      }).join(", ");
    }

    itemsWithDoses.forEach(item=>{
      const correct = ratioStr(item);
      // Wrong options: ratio strings from other items with doses, or if not enough, shuffle doses of this item
      const otherRatios = sh(allItemsWithDoses.filter(x=>x.name!==item.name)).slice(0,3).map(ratioStr);
      // Pad with shuffled-dose variants if needed
      while(otherRatios.length < 3){
        const shuffledDoses = sh(Object.entries(item.doses||{}));
        const fake = item.ingr.map(ing=>{
          const dose = shuffledDoses.find(([k])=>k!==ing)?.[1];
          return dose ? `${dose} ${ing}` : ing;
        }).join(", ");
        if(fake !== correct) otherRatios.push(fake);
        else break;
      }
      if(otherRatios.length >= 1){
        res.push({qtype:"ratio", img:IMAGES[item.name]||null,
          q:`¿Cuál es el ratio del ${item.name}?`,
          opts:sh([correct,...otherRatios.slice(0,3)]), answer:correct, cat:item.cat,
          hint:`${item.name}: ${correct}`});
      }
    });
  }

  // --- Name questions (cocktails only — use ingredients as clue) ---
  if(activeFilters.has("name")){
    const cocktailItems = pool.filter(x=>x.hasIngr&&x.ingr);
    cocktailItems.forEach(item=>{
      // Try several random clue combos until we find one that uniquely
      // identifies this item among the pool (no other item shares ALL clue ingredients)
      let clue=null;
      const maxTries=8;
      for(let attempt=0; attempt<maxTries; attempt++){
        const size = item.ingr.length>=3 ? (Math.random()<0.5?2:3) : Math.min(2,item.ingr.length);
        const candidate = pick(item.ingr, size);
        const ambiguous = cocktailItems.some(other=>
          other.name!==item.name &&
          candidate.every(c=>other.ingr.includes(c))
        );
        if(!ambiguous){ clue=candidate; break; }
      }
      if(!clue) return; // couldn't find a unique clue — skip this item

      const wrongNames=sh(cocktailItems.filter(x=>x.name!==item.name)).slice(0,3).map(x=>x.name);
      if(wrongNames.length>=3) res.push({qtype:"name",img:IMAGES[item.name]||null,
        q:`¿Qué cóctel lleva ${clue.join(" y ")}?`,
        opts:sh([item.name,...wrongNames]),answer:item.name,cat:item.cat,
        hint:`${item.name}: ${item.ingr.join(", ")}`});
    });
  }

  return sh(res).slice(0,15);
}

function updateMeta(){

function buildFilters(){

function setTab(c){activeTab=c;buildTabs();if(appMode==='learn')startLearn();else startQuiz();}
function toggleFilter(t){

function startQuiz(){

function render(){

  answered=false;updateMeta();
  const q=questions[cur];

function choose(btn,chosen,correct){
  if(answered)return;answered=true;

    b.disabled=true;

function startLearnMain(){
  learnStage = 'main';
  learnIdx = 0;
  learnPhase = 'study';
  renderLearn();
}

function renderLearn(){
  if(learnStage==='overview'){ renderOverview(); return; }
  if(learnStage==='main'){
    if(learnIdx >= learnQueue.length){
      learnStage='recall';
      learnIdx=0;
      // Recall stage only makes sense for items with real recipes
      if(!learnQueue.some(x=>x.hasIngr && x.ingr && x.ingr.length>1)){
        renderLearnEnd(); return;
      }
      renderLearn();
      return;
    }
    const item = learnQueue[learnIdx];
    const pct = Math.round((learnIdx / learnQueue.length)*50);
    document.getElementById('prog').style.width = pct+'%';
    const hasRecipe = item.hasIngr && item.ingr && item.ingr.length>1;
    if(learnPhase==='study') renderStudy(item);
    else if(learnPhase==='recall' && hasRecipe) renderRecall(item);
    else renderLearnQuiz(item);
  } else {
    // Final recall stage: skip items without real recipes
    while(learnIdx < learnQueue.length && !(learnQueue[learnIdx].hasIngr && learnQueue[learnIdx].ingr && learnQueue[learnIdx].ingr.length>1)){
      learnIdx++;
    }
    if(learnIdx >= learnQueue.length){ renderLearnEnd(); return; }
    const item = learnQueue[learnIdx];
    const pct = 50 + Math.round((learnIdx / learnQueue.length)*50);
    document.getElementById('prog').style.width = pct+'%';
    renderRecall(item);
  }
}

function genIngrQ(item){
  const types = sh(['ingredients','ingredients2','ingredients3']);
  for(const t of types){
    if(t==='ingredients'){
      const required = item.ingr.filter(i=>!item.optional || !item.optional.includes(i));
      if(required.length===0) continue;
      const correct=required[Math.floor(Math.random()*required.length)];
      const wrongs=sh(ALL_INGRS.filter(i=>!item.ingr.includes(i))).slice(0,3);
      if(wrongs.length>=3) return {qtype:t,
        q:`¿Cuál de estos ingredientes lleva el ${item.name}?`,
        opts:sh([correct,...wrongs]),answer:correct,
        hint:`${item.name}: ${item.ingr.join(", ")}`};
    }
    if(t==='ingredients2' && item.ingr.length>=3){
      const required = item.ingr.filter(i=>!item.optional || !item.optional.includes(i));
      if(required.length<3) continue;
      const s=sh(required); const shown=s.slice(0,2),c2=s[2];
      const wrongs=sh(ALL_INGRS.filter(i=>!item.ingr.includes(i))).slice(0,3);
      if(wrongs.length>=3) return {qtype:t,
        q:`El ${item.name} lleva ${shown.join(" y ")}… ¿cuál más?`,
        opts:sh([c2,...wrongs]),answer:c2,
        hint:`${item.name}: ${item.ingr.join(", ")}`};
    }
    if(t==='ingredients3' && item.ingr.length>=3){
      const intruder=sh(ALL_INGRS.filter(i=>!item.ingr.includes(i)))[0];
      const decoys=sh(item.ingr).slice(0,3);
      if(intruder&&decoys.length>=3) return {qtype:t,
        q:`¿Cuál de estos NO lleva el ${item.name}?`,
        opts:sh([intruder,...decoys]),answer:intruder,
        hint:`${item.name} lleva: ${item.ingr.join(", ")}`};
    }
  }
  return null;
}

function genPriceQ(item){
  if(!item.prices || !item.prices.length) return null;
  const serving = item.prices[Math.floor(Math.random()*item.prices.length)];
  const wrongPs = sh(UNIQUE_PRICES.filter(p=>p!==serving.p)).slice(0,3);
  if(wrongPs.length<3) return null;
  const hint_parts = item.prices.map(s=>`${s.label}: ${fmt(s.p)}`).join(" · ");
  return {qtype:'price',
    q:`¿Cuánto cuesta el ${item.name} (${serving.label})?`,
    opts:sh([serving.p,...wrongPs]).map(fmt),answer:fmt(serving.p),
    hint:`${item.name} — ${hint_parts}`};
}

function genQuizQueue(item){
  // Always include a price question; include an ingredient question if the item has a recipe.
  const qs = [];
  const hasRecipe = item.hasIngr && item.ingr && item.ingr.length>1;
  if(hasRecipe){
    const iq = genIngrQ(item);
    if(iq) qs.push(iq);
  }
  const pq = genPriceQ(item);
  if(pq) qs.push(pq);
  return qs;
}

function renderStudy(item){
  const hasRecipe = item.hasIngr && item.ingr && item.ingr.length>1;

  let rowsHtml = '';
  if(hasRecipe){
    // Group this cocktail's ingredients by category, preserving GROUP_ORDER
    const byGroup = {};
    item.ingr.forEach(ing=>{
      const g = ingrGroup(ing);
      (byGroup[g] = byGroup[g] || []).push(ing);
    });

    // Row 1: spirit + liqueur share one row. Row 2: filler/bitter/sweet/other share another row.
    const ROW_GROUPS = [["spirit","liqueur"], ["filler","bitter","sweet","other"]];

    rowsHtml = ROW_GROUPS.map(rowGroups=>{
      const present = rowGroups.filter(g=>byGroup[g]);
      if(!present.length) return '';
      const colsHtml = present.map(g=>{
        const itemsHtml = byGroup[g].map(ing=>{
          const img = IMAGES[ing];
          if(img) return `<div class="learn-ingr-item"><img src="${img}" alt="${ing}"><span>${ing}</span></div>`;
          return `<div class="learn-ingr-item no-img"><span>${ing}</span></div>`;
        }).join('');
        return `<div class="ingr-group grp-${g}">
          <div class="ingr-group-label">${GROUP_LABELS[g]}</div>
          <div class="ingr-group-grid">${itemsHtml}</div>
        </div>`;
      }).join('');
      return `<div class="ingr-row">${colsHtml}</div>`;
    }).join('');
  } else {
    rowsHtml = `<div class="learn-hint">Sin receta — solo precio / No recipe — price only</div>`;
  }

  const btnAction = hasRecipe ? 'goRecall()' : 'goQuiz()';
  const btnLabel = hasRecipe
    ? 'Memorizado — a recordar →<br><small style="opacity:.6">o pulsa Espacio</small>'
    : 'Memorizado — a practicar →<br><small style="opacity:.6">o pulsa Espacio</small>';

  // Doses block - compact version
  const dosesHtml = item.doses && Object.keys(item.doses).length
    ? `<div style="font-size:12px;color:#E0AE6B;margin-top:6px;line-height:1.5">
        ${Object.entries(item.doses).map(([ing,dose])=>
          `<div style="display:flex;gap:4px"><span>${ing}</span><span style="opacity:.7">${dose}</span></div>`
        ).join('')}
      </div>` : '';

  const methodHtml = item.method
    ? `<div style="font-size:12px;color:#8FC1E0;margin-top:6px">${item.method}</div>` : '';

  document.getElementById('area').innerHTML = `
    <div class="learn-card">
      <div class="learn-counter">Estudio · ${learnIdx+1} / ${learnQueue.length}</div>
      <div style="display:flex;gap:12px;margin-bottom:12px">
        ${IMAGES[item.name]?`<img style="width:100px;height:100px;object-fit:cover;border-radius:8px;flex-shrink:0" src="${IMAGES[item.name]}" alt="${item.name}">`:'<div style="width:100px;height:100px;background:#2a2926;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0">🍹</div>'}
        <div style="flex:1;min-width:0">
          <div class="learn-name" style="margin:0;font-size:20px">${item.name} <span class="learn-price">${priceLabel(item)}</span></div>
          ${dosesHtml}
          ${methodHtml}
        </div>
      </div>
      ${rowsHtml}
    </div>
    <div class="nav">
      <button class="pri" onclick="${btnAction}">${btnLabel}</button>
    </div>`;
}

function goRecall(){
  learnPhase = 'recall';
  renderLearn();
}

function renderRecall(item){
  // Pool: correct ingrs + random wrong ones from all cocktails
  const wrongPool = sh(ALL_INGRS.filter(i=>!item.ingr.includes(i)));
  const distractors = wrongPool.slice(0, Math.min(item.ingr.length + 2, 8));
  // Shuffle within each group, but keep groups in GROUP_ORDER
  const byGroup = {};
  [...item.ingr, ...distractors].forEach(o=>{
    const g = ingrGroup(o);
    (byGroup[g] = byGroup[g] || []).push(o);
  });
  const allOpts = GROUP_ORDER.flatMap(g => byGroup[g] ? sh(byGroup[g]) : []);
  recallSelected = new Set();

  const optsHtml = allOpts.map(o=>{
    const img = IMAGES[o];
    const grp = ingrGroup(o);
    const cls = `recall-opt grp-${grp}`;
    if(img) return `<button class="${cls}" data-opt="${o.replace(/"/g,'&quot;')}" onclick="toggleRecall(this,'${o.replace(/'/g,"\\'")}')"><img src="${img}" alt="${o}"><span>${o}</span></button>`;
    return `<button class="${cls}" data-opt="${o.replace(/"/g,'&quot;')}" onclick="toggleRecall(this,'${o.replace(/'/g,"\\'")}')"><span>${o}</span></button>`;
  }).join('');

  document.getElementById('area').innerHTML = `
    <div class="learn-card">
      <div class="learn-counter">${learnStage==='main'?'Recordar':'Repaso final'} · ${learnIdx+1} / ${learnQueue.length}</div>
      ${IMAGES[item.name]?`<img class="qimg" src="${IMAGES[item.name]}" alt="${item.name}">`:''}
      <div class="learn-name">${item.name} <span class="learn-price">${priceLabel(item)}</span></div>
      <div class="learn-hint">Selecciona todos los ingredientes / Select all ingredients</div>
      <div class="learn-ingr-grid" id="recallGrid">${optsHtml}</div>
    </div>
    <div class="nav" id="nav">
      <button class="pri" onclick="checkRecall('${item.name.replace(/'/g,"\\'")}')">Comprobar / Check ✓</button>
    </div>`;
}

function toggleRecall(btn, val){
  if(btn.dataset.locked) return;
  if(recallSelected.has(val)){
    recallSelected.delete(val);
    btn.classList.remove('selected');
  } else {
    recallSelected.add(val);
    btn.classList.add('selected');
  }
}

function checkRecall(name){
  const item = learnQueue.find(x=>x.name===name);
  const correct = new Set(item.ingr);
  const optional = new Set(item.optional || []);
  const grid = document.getElementById('recallGrid');
  let hits=0, misses=0, wrongs=0;

  grid.querySelectorAll('.recall-opt').forEach(btn=>{
    btn.dataset.locked = '1';
    const val = btn.dataset.opt;
    const isCorrect = correct.has(val);
    const isOptional = optional.has(val);
    const isSelected = recallSelected.has(val);
    if(isCorrect && isSelected){ btn.classList.add('correct'); hits++; }
    else if(isCorrect && !isSelected && !isOptional){ btn.classList.add('missed'); misses++; }
    else if(!isCorrect && isSelected){ btn.classList.add('wrong'); wrongs++; }
    else if(isOptional && isSelected){ btn.classList.add('correct'); hits++; }
    btn.classList.remove('selected');
  });

  const required = item.ingr.filter(i => !optional.has(i)).length;
  const perfect = misses===0 && wrongs===0;
  const msg = perfect
    ? '✓ ¡Perfecto! / Perfect!'
    : `${hits}/${required} ingredientes — ${misses} olvidados, ${wrongs} incorrectos`;

  let nextLabel, nextAction;
  if(learnStage==='main'){
    // Practice recall, before the quiz question — doesn't count toward final stats
    nextLabel = 'Practicar / Practice →';
    nextAction = 'goQuiz()';
  } else {
    // Final review recall — counts toward end-of-session stats
    recallStats.total += required;
    recallStats.hits += hits;
    recallStats.items++;
    if(perfect) recallStats.perfect++;
    const isLast = learnIdx >= learnQueue.length - 1;
    nextLabel = isLast ? 'Ver resultados / Results →' : 'Siguiente / Next →';
    nextAction = 'nextLearn()';
  }

  // Replace check button with feedback + next
  document.querySelector('.nav').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;width:100%">
      <div style="text-align:center;padding:8px 0;font-size:14px;color:${perfect?'#97C459':'#c87020'}">${msg}</div>
      <button class="pri" style="width:100%" onclick="${nextAction}">${nextLabel}</button>
    </div>`;
  document.getElementById('nav').dataset.checked = '1';
}

function goQuiz(){
  learnPhase = 'quiz';
  renderLearn();
}

function nextLearn(){
  learnIdx++;
  if(learnStage==='main') learnPhase = 'study';
  renderLearn();
}

function renderLearnEnd(){
  document.getElementById('prog').style.width='100%';
  const hadRecipes = learnQueue.some(x=>x.hasIngr && x.ingr && x.ingr.length>1);

  const reviewedLine = hadRecipes
    ? `Repasaste ${learnQueue.length} cócteles.<br><em>You reviewed ${learnQueue.length} cocktails.</em>`
    : `Repasaste ${learnQueue.length} bebidas.<br><em>You reviewed ${learnQueue.length} drinks.</em>`;

  let recallBlock = '';
  if(hadRecipes && recallStats.total>0){
    const pct = Math.round(recallStats.hits/recallStats.total*100);
    recallBlock = `<br><br>
        <strong style="color:#e8e6e1">Repaso final / Final recall</strong><br>
        ${recallStats.hits}/${recallStats.total} ingredientes (${pct}%) · ${recallStats.perfect}/${recallStats.items} perfectos`;
  }

  document.getElementById('area').innerHTML=`
    <div class="learn-card end">
      <div class="big">🎓</div>
      <div class="sc" style="font-size:22px;font-weight:500;margin-bottom:8px">¡Sesión completada!</div>
      <p style="color:#9a9793;font-size:14px">
        ${reviewedLine}${recallBlock}
      </p>
      <div class="nav" style="margin-top:1.5rem;display:flex">
        <button class="pri" onclick="startLearn()">Repetir / Again</button>
      </div>
    </div>`;
}

// Override keydown to also work in learn mode
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.key === ' ' || e.code === 'Enter' || e.key === 'Enter') {
    e.preventDefault();
    if(appMode==='test'){
      const nav = document.getElementById('nav');
      if (nav && nav.style.display !== 'none') nextQ();
    } else if(learnStage==='main'){
      const item = learnQueue[learnIdx];
      const hasRecipe = item && item.hasIngr && item.ingr && item.ingr.length>1;
      if(learnPhase==='study'){
        if(hasRecipe) goRecall(); else goQuiz();
      } else if(learnPhase==='recall' && hasRecipe){
        const nav = document.getElementById('nav');
        if(nav && nav.dataset.checked==='1') goQuiz();
      } else {
        const nav = document.getElementById('nav');
        if (nav && nav.style.display !== 'none') nextQuizStep();
      }
    } else {
      // final review stage: space/enter advances only after "Check" has been pressed
      const nav = document.getElementById('nav');
      if(nav && nav.dataset.checked==='1') nextLearn();
    }
  }
});

buildTabs();buildFilters();setMode('learn');
</script>
